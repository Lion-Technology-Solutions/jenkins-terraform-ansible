---
- name: Install and configure Jenkins DevOps controller
  hosts: jenkins
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Require a strong Jenkins admin password
      ansible.builtin.assert:
        that:
          - jenkins_admin_password is defined
          - jenkins_admin_password | length >= 12
        fail_msg: "Set JENKINS_ADMIN_PASSWORD or pass -e jenkins_admin_password=... with at least 12 characters."
      no_log: true

    - name: Install base package prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - fontconfig
          - git
          - gnupg
          - jq
          - lsb-release
          - python3-pip
          - software-properties-common
          - unzip
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Create APT keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Get Debian architecture
      ansible.builtin.command:
        cmd: dpkg --print-architecture
      register: deb_arch
      changed_when: false

  tasks:
    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /tmp/docker.asc
        mode: "0644"
      register: docker_gpg_key

    - name: Check Docker keyring
      ansible.builtin.stat:
        path: /etc/apt/keyrings/docker.gpg
      register: docker_keyring

    - name: Install Docker GPG keyring
      ansible.builtin.command:
        cmd: gpg --dearmor --yes -o /etc/apt/keyrings/docker.gpg /tmp/docker.asc
      when: docker_gpg_key.changed or not docker_keyring.stat.exists

    - name: Configure Docker APT repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"
        content: |
          deb [arch={{ deb_arch.stdout }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
      register: docker_repo

    - name: Download Jenkins GPG key
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
        dest: /tmp/jenkins.asc
        mode: "0644"
      register: jenkins_gpg_key

    - name: Check Jenkins keyring
      ansible.builtin.stat:
        path: /usr/share/keyrings/jenkins-keyring.gpg
      register: jenkins_keyring

    - name: Install Jenkins GPG keyring
      ansible.builtin.command:
        cmd: gpg --dearmor --yes -o /usr/share/keyrings/jenkins-keyring.gpg /tmp/jenkins.asc
      when: jenkins_gpg_key.changed or not jenkins_keyring.stat.exists

    - name: Configure Jenkins LTS APT repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/jenkins.list
        mode: "0644"
        content: |
          deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/
      register: jenkins_repo

    - name: Download HashiCorp GPG key
      ansible.builtin.get_url:
        url: https://apt.releases.hashicorp.com/gpg
        dest: /tmp/hashicorp.asc
        mode: "0644"
      register: hashicorp_gpg_key

    - name: Check HashiCorp keyring
      ansible.builtin.stat:
        path: /etc/apt/keyrings/hashicorp.gpg
      register: hashicorp_keyring

    - name: Install HashiCorp GPG keyring
      ansible.builtin.command:
        cmd: gpg --dearmor --yes -o /etc/apt/keyrings/hashicorp.gpg /tmp/hashicorp.asc
      when: hashicorp_gpg_key.changed or not hashicorp_keyring.stat.exists

    - name: Configure HashiCorp APT repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/hashicorp.list
        mode: "0644"
        content: |
          deb [arch={{ deb_arch.stdout }} signed-by=/etc/apt/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main
      register: hashicorp_repo

    - name: Download Helm GPG key
      ansible.builtin.get_url:
        url: https://packages.buildkite.com/helm-linux/helm-debian/gpgkey
        dest: /tmp/helm.asc
        mode: "0644"
      register: helm_gpg_key

    - name: Verify Helm GPG key fingerprint
      ansible.builtin.command:
        argv:
          - gpg
          - --show-keys
          - --with-colons
          - /tmp/helm.asc
      register: helm_gpg_fingerprint
      changed_when: false

    - name: Assert Helm GPG key fingerprint is trusted
      ansible.builtin.assert:
        that:
          - "'DDF78C3E6EBB2D2CC223C95C62BA89D07698DBC6' in helm_gpg_fingerprint.stdout"
        fail_msg: "Unexpected Helm APT signing key fingerprint. Refusing to configure the Helm repository."

    - name: Check Helm keyring
      ansible.builtin.stat:
        path: /usr/share/keyrings/helm.gpg
      register: helm_keyring

    - name: Install Helm GPG keyring
      ansible.builtin.command:
        cmd: gpg --dearmor --yes -o /usr/share/keyrings/helm.gpg /tmp/helm.asc
      when: helm_gpg_key.changed or not helm_keyring.stat.exists

    - name: Configure Helm APT repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/helm-stable-debian.list
        mode: "0644"
        content: |
          deb [signed-by=/usr/share/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main
      register: helm_repo

    - name: Update APT cache after adding repositories
      ansible.builtin.apt:
        update_cache: true
      when: docker_repo.changed or jenkins_repo.changed or hashicorp_repo.changed or helm_repo.changed

    - name: Install Jenkins, Docker, Terraform, Ansible, and Helm packages
      ansible.builtin.apt:
        name:
          - ansible
          - containerd.io
          - docker-buildx-plugin
          - docker-ce
          - docker-ce-cli
          - docker-compose-plugin
          - helm
          - jenkins
          - openjdk-17-jre
          - terraform
        state: present

    - name: Install kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"
        force: false

    - name: Check AWS CLI
      ansible.builtin.command:
        cmd: aws --version
      register: aws_cli_check
      failed_when: false
      changed_when: false

    - name: Download AWS CLI v2 installer
      ansible.builtin.get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: "0644"
      when: aws_cli_check.rc != 0 or aws_cli_force_reinstall | bool

    - name: Extract AWS CLI v2 installer
      ansible.builtin.unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true
      when: aws_cli_check.rc != 0 or aws_cli_force_reinstall | bool

    - name: Install or update AWS CLI v2
      ansible.builtin.command:
        cmd: /tmp/aws/install --update
      when: aws_cli_check.rc != 0 or aws_cli_force_reinstall | bool

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"

    - name: Stop Jenkins before first configuration
      ansible.builtin.systemd:
        name: jenkins
        state: stopped
      failed_when: false

    - name: Create Jenkins systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/jenkins.service.d
        state: directory
        mode: "0755"

    - name: Configure Jenkins service environment
      ansible.builtin.template:
        src: jenkins-override.conf.j2
        dest: /etc/systemd/system/jenkins.service.d/override.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart Jenkins

    - name: Create Jenkins init directory
      ansible.builtin.file:
        path: /var/lib/jenkins/init.groovy.d
        state: directory
        owner: jenkins
        group: jenkins
        mode: "0750"

    - name: Check Jenkins bootstrap marker
      ansible.builtin.stat:
        path: /var/lib/jenkins/.codex-bootstrap-complete
      register: jenkins_bootstrap_marker

    - name: Configure Jenkins security bootstrap script
      ansible.builtin.template:
        src: 01-basic-security.groovy.j2
        dest: /var/lib/jenkins/init.groovy.d/01-basic-security.groovy
        owner: jenkins
        group: jenkins
        mode: "0600"
      when: not jenkins_bootstrap_marker.stat.exists
      no_log: true
      notify: Restart Jenkins

    - name: Ensure Jenkins is enabled and started
      ansible.builtin.systemd:
        name: jenkins
        enabled: true
        state: started
        daemon_reload: true

    - name: Flush Jenkins restart handlers
      ansible.builtin.meta: flush_handlers

    - name: Wait for Jenkins HTTP endpoint
      ansible.builtin.uri:
        url: "{{ jenkins_controller_url }}/login"
        status_code:
          - 200
          - 403
        timeout: 10
      register: jenkins_http
      retries: 30
      delay: 10
      until: jenkins_http.status in [200, 403]

    - name: Remove Jenkins bootstrap script containing admin password
      ansible.builtin.file:
        path: /var/lib/jenkins/init.groovy.d/01-basic-security.groovy
        state: absent

    - name: Mark Jenkins bootstrap complete
      ansible.builtin.file:
        path: /var/lib/jenkins/.codex-bootstrap-complete
        state: touch
        owner: jenkins
        group: jenkins
        mode: "0600"

    - name: Download Jenkins CLI jar
      ansible.builtin.get_url:
        url: "{{ jenkins_controller_url }}/jnlpJars/jenkins-cli.jar"
        dest: "{{ jenkins_cli_jar }}"
        mode: "0644"

    - name: Read installed Jenkins plugins
      ansible.builtin.command:
        argv:
          - java
          - -jar
          - "{{ jenkins_cli_jar }}"
          - -s
          - "{{ jenkins_controller_url }}/"
          - -auth
          - "{{ jenkins_admin_user }}:{{ jenkins_admin_password }}"
          - list-plugins
      register: jenkins_installed_plugins_result
      changed_when: false
      no_log: true

    - name: Calculate missing Jenkins plugins
      ansible.builtin.set_fact:
        installed_jenkins_plugins: "{{ jenkins_installed_plugins_result.stdout_lines | map('regex_replace', '^([^ ]+).*', '\\1') | list }}"
        missing_jenkins_plugins: "{{ jenkins_plugins | difference(installed_jenkins_plugins) }}"

    - name: Install missing Jenkins plugins with dependencies
      ansible.builtin.command:
        argv: "{{ ['java', '-jar', jenkins_cli_jar, '-s', jenkins_controller_url + '/', '-auth', jenkins_admin_user + ':' + jenkins_admin_password, 'install-plugin'] + missing_jenkins_plugins + ['-deploy'] }}"
      when: missing_jenkins_plugins | length > 0
      no_log: true
      notify: Restart Jenkins

    - name: Flush Jenkins plugin restart handler
      ansible.builtin.meta: flush_handlers

    - name: Wait for Jenkins after plugin installation
      ansible.builtin.uri:
        url: "{{ jenkins_controller_url }}/login"
        status_code:
          - 200
          - 403
        timeout: 10
      register: jenkins_ready_after_plugins
      retries: 30
      delay: 10
      until: jenkins_ready_after_plugins.status in [200, 403]

    - name: Show Jenkins access details
      ansible.builtin.debug:
        msg:
          - "Jenkins URL: {{ jenkins_public_url | default(jenkins_public_url_default) }}"
          - "Jenkins admin user: {{ jenkins_admin_user }}"
          - "Installed tooling: Docker, AWS CLI, kubectl, Helm, Terraform, Ansible"

  handlers:
    - name: Restart Jenkins
      ansible.builtin.systemd:
        name: jenkins
        state: restarted
        enabled: true
        daemon_reload: true
